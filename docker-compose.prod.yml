services:
  postgres:
    image: postgres:16-alpine
    container_name: betcoin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-betcoin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-betcoin}
      POSTGRES_DB: ${DB_NAME:-betcoin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betcoin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: betcoin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    container_name: betcoin-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-betcoin}:${DB_PASSWORD:-betcoin}@postgres:5432/${DB_NAME:-betcoin}
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    container_name: betcoin-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_PRIVY_APP_ID: cmnf31y2604700di8dykg6lzu
      NEXT_PUBLIC_API_URL: https://api.betcoin.novitatus.com
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
