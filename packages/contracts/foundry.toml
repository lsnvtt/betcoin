[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"
amoy = "https://rpc-amoy.polygon.technology"

[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}" }
