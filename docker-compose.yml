services:
  postgres:
    image: postgres:16-alpine
    container_name: betcoin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: betcoin
      POSTGRES_PASSWORD: betcoin
      POSTGRES_DB: betcoin
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: betcoin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
