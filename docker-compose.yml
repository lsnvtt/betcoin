services:
  postgres:
    image: postgres:16-alpine
    container_name: betcoin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: betcoin
      POSTGRES_PASSWORD: betcoin
      POSTGRES_DB: betcoin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betcoin"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: betcoin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: node:20-alpine
    container_name: betcoin-server
    restart: unless-stopped
    working_dir: /app/packages/server
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://betcoin:betcoin@postgres:5432/betcoin
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: development
      PRIVY_APP_ID: ${PRIVY_APP_ID:-cmnf31y2604700di8dykg6lzu}
      PRIVY_APP_SECRET: ${PRIVY_APP_SECRET:-}
      POLYGON_RPC_URL: https://rpc-amoy.polygon.technology
      CHAIN_ID: "80002"
    command: sh -c "cd /app && npm install --ignore-scripts 2>/dev/null; cd /app/packages/server && npx prisma generate && npx tsx watch src/index.ts"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: betcoin-web
    restart: unless-stopped
    working_dir: /app/packages/web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_PRIVY_APP_ID: ${PRIVY_APP_ID:-cmnf31y2604700di8dykg6lzu}
      NEXT_PUBLIC_API_URL: http://localhost:3001
    command: sh -c "cd /app && npm install --ignore-scripts 2>/dev/null; cd /app/packages/web && npx next dev --port 3000 --hostname 0.0.0.0"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
  root_node_modules:
